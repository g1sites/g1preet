<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Contact — G1 SherGill</title>
<meta name="description" content="Drop G1 a line." />
<meta name="robots" content="index,follow" />
<link rel="preconnect" href="https://fonts.bunny.net" crossorigin />
<link rel="stylesheet" href="https://fonts.bunny.net/css?family=fraunces:400,600,700|inter:400,500,600" />
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      colors: { ink:'#1a1410', ink2:'#241c17', cream:'#f5efe6', cream2:'#ebe2d3', terracotta:'#c0623f', gold:'#d4a574', muted:'#8a7a6a' },
      fontFamily: { serif:['Fraunces','ui-serif','Georgia','serif'], sans:['Inter','ui-sans-serif','system-ui','sans-serif'] }
    }
  }
}
</script>
<style>
  body{background:#1a1410;color:#f5efe6;font-family:Inter,system-ui,sans-serif}
  .reveal{opacity:0;transform:translateY(12px);transition:opacity .7s ease,transform .7s ease}
  .reveal.in{opacity:1;transform:none}
  .grain{background-image:radial-gradient(rgba(245,239,230,.04) 1px,transparent 1px);background-size:3px 3px}
</style>
</head>
<body class="antialiased min-h-screen flex flex-col">

<header class="absolute top-0 left-0 right-0 z-20">
  <nav class="max-w-6xl mx-auto px-6 py-6 flex items-center justify-between">
    <a href="/" class="font-serif text-xl tracking-tight text-cream">G1<span class="text-terracotta">.</span></a>
    <div class="flex items-center gap-6 text-sm text-cream/80">
      <a href="/" class="hover:text-terracotta transition">Home</a>
      <a href="/help/" class="hover:text-terracotta transition">Help</a>
    </div>
  </nav>
</header>

<main class="flex-1 relative grain pt-32 pb-20">
  <div class="absolute -top-20 -right-20 w-80 h-80 rounded-full bg-terracotta/10 blur-3xl"></div>
  <div class="absolute -bottom-20 -left-20 w-80 h-80 rounded-full bg-gold/10 blur-3xl"></div>

  <div class="relative max-w-2xl mx-auto px-6">
    <p class="reveal text-terracotta text-xs uppercase tracking-[0.3em] mb-6">Contact</p>
    <h1 class="reveal font-serif text-4xl sm:text-6xl leading-tight text-cream mb-6">Drop me a <span class="italic text-gold">line</span>.</h1>
    <p class="reveal text-cream/70 text-lg mb-12 max-w-lg">Use the form below — it goes straight to me.</p>

    <div class="reveal bg-cream rounded-2xl overflow-hidden shadow-2xl">
      <iframe
        src="https://form.jotform.com/g1preet/webcontact-g1p"
        title="Contact G1"
        loading="lazy"
        class="w-full"
        style="border:0;min-height:760px;background:#f5efe6"
        allow="geolocation; microphone; camera; fullscreen"
      ></iframe>
    </div>

    <p class="reveal mt-8 text-cream/50 text-sm">
      Form not loading? <a class="text-terracotta hover:text-gold transition underline underline-offset-4" href="https://form.jotform.com/g1preet/webcontact-g1p" target="_blank" rel="noopener">Open it in a new tab</a>.
    </p>
  </div>
</main>

<footer class="border-t border-cream/10 py-8">
  <div class="max-w-6xl mx-auto px-6 flex items-center justify-between text-xs text-cream/50">
    <p>G1preet &copy; 2026</p>
    <a href="/" class="hover:text-terracotta transition">Home</a>
  </div>
</footer>

<script>
  const io = new IntersectionObserver((es)=>es.forEach(e=>{if(e.isIntersecting){e.target.classList.add('in');io.unobserve(e.target)}}),{threshold:.1});
  document.querySelectorAll('.reveal').forEach(el=>io.observe(el));
</script>
</body>
</html>
